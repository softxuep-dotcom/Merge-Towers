<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Merge Towers</title>
<script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #12131f; width: 100%; height: 100%; overflow: hidden; }
  #game { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; touch-action: none; background: #12131f; }
  canvas { display: block; }
  #loading { position: fixed; inset: 0; z-index: 10; display: grid; place-content: center; gap: 18px; color: #fff; background: #12131f; font: 700 18px/1.2 Arial, sans-serif; text-align: center; transition: opacity .25s ease; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading-bar { width: min(280px, 68vw); height: 10px; overflow: hidden; border: 2px solid #4f536d; border-radius: 999px; background: #202235; }
  #loading-fill { width: 0; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #58c98f, #ffd34e); transition: width .12s ease; }
  #loading-percent { color: #aeb4d0; font-size: 13px; font-weight: 400; }
</style>
</head>
<body>
<div id="loading" role="status" aria-live="polite">
  <div>MERGE TOWERS</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <div id="loading-percent">0%</div>
</div>
<div id="game"></div>
<script>
  window.setLoadingProgress = function (value) {
    var percent = Math.round(Math.max(0, Math.min(1, value || 0)) * 100);
    document.getElementById('loading-fill').style.width = percent + '%';
    document.getElementById('loading-percent').textContent = percent + '%';
  };
  window.finishLoading = function () {
    window.setLoadingProgress(1);
    var loading = document.getElementById('loading');
    loading.classList.add('hidden');
    setTimeout(function () { loading.remove(); }, 300);
  };
</script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
